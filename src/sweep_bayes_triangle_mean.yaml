# =============================================================================
# Bayes-Sweep Config — TRIANGLE VALIDITY (Geometrische Konsistenz)
# =============================================================================
# Aufruf:
#   wandb sweep sweep_bayes_triangle.yaml
#   wandb agent <sweep_id>
# =============================================================================

program: training_qgan_wandb_fixed_tri.py
project: qugan-ba-hp-sweep
method: bayes
run_cap: 60

# Ziel-Metrik: MITTELWERT der Triangle-Validity ueber ALLE Eval-Steps des Trainings.
# Robuster als best_triangle_validity, weil einzelne Spike-Werte nur 1/N
# Gewicht im Mittel haben. Bevorzugt Configs, die KONSISTENT geometrisch
# valide Tupel ueber das gesamte Training produzieren.
# Wertebereich: [0, 1], hoeher = besser.
#
# WICHTIG: Die Dreiecksungleichung wird NUR zur Sweep-Auswahl verwendet,
# NICHT als Lernziel im Trainings-Loss. Der GAN-Loss bleibt unveraendert
# (BCE auf Discriminator-Outputs). Bayes sucht lediglich nach HP-Configs,
# bei denen der Generator als Nebeneffekt der Verteilungsapproximation
# moeglichst viele geometrisch konsistente Tupel produziert.
metric:
  name: mean_triangle_validity
  goal: maximize

# Early Termination: stoppe Runs, die nach 1000 Steps schon klar abgeschlagen sind.
# Spart Rechenzeit fuer aussichtslose HP-Konfigurationen.
early_terminate:
  type: hyperband
  min_iter: 1000        # frueheste Pruefung nach Step 1000
  max_iter: 5000        # Gesamtdauer
  eta: 3                # Reduktionsrate (3 = drittel ueberleben jede Stufe)
  s: 2                  # Anzahl Stufen

parameters:
  # ---- Lernraten (zentral fuer GAN-Training, vgl. Heusel et al. 2017 TTUR) ----
  g_lr:
    distribution: log_uniform_values
    min: 0.00001        # 1e-5
    max: 0.01           # 1e-2 — Adam wird bei groesseren Werten typisch instabil

  d_lr:
    distribution: log_uniform_values
    min: 0.00001
    max: 0.01

  # ---- Schaltkreis-Tiefe ----
  layers:
    values: [2, 4, 8, 16]

  # ---- Parameter-Initialisierung ----
  init_std:
    distribution: uniform
    min: 0.05
    max: 0.5

# ---- Fixe Parameter (nicht gesweept) ----
command:
  - ${env}
  - "C:\\Users\\cac\\Documents\\VsCode\\BA\\QuGAN_BA_Caner\\src\\.venv\\Scripts\\python.exe"
  - ${program}
  - "--steps=5000"
  - "--batch-size=32"
  - "--latent-distribution=angle"
  - "--latent-dim=6"
  - "--use-mbd"
  - "--label-smoothing=0.1"
  - "--n-critic-g=1"
  - "--checkpoint-every=1000"
  - "--wasserstein-eval-every=200"
  - "--wasserstein-eval-samples=1500"
  - "--composite-norm-wasserstein=0.023"
  - "--composite-norm-frobenius=1.18"
  - "--wandb-project=qugan-ba-hp-sweep"
  - "--seed=0"
  - ${args}
